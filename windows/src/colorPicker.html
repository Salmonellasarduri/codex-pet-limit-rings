<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Choose Ring Color</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        background: #17191d;
        color: #f4f7fb;
        font-family: "Segoe UI", system-ui, sans-serif;
        user-select: none;
      }

      main {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 650;
      }

      input[type="color"] {
        width: 100%;
        height: 72px;
        border: 0;
        padding: 0;
        background: transparent;
      }

      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      button {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        background: #2b3038;
        color: #f4f7fb;
        font: inherit;
        padding: 6px 12px;
      }

      button.primary {
        background: #1768d5;
        border-color: #2d7bea;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="title">Choose Ring Color</h1>
      <input id="color" type="color" value="#4cebc2" />
      <div class="actions">
        <button id="cancel">Cancel</button>
        <button id="apply" class="primary">Apply</button>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const ring = params.get("ring") === "inner" ? "inner" : "outer";
      const initial = /^#[0-9a-fA-F]{6}$/.test(params.get("color") || "") ? params.get("color") : "#4cebc2";
      document.getElementById("title").textContent = ring === "inner" ? "Choose Inner Ring Color" : "Choose Outer Ring Color";
      document.getElementById("color").value = initial;
      document.getElementById("apply").addEventListener("click", () => {
        window.limitRingsColorPicker.apply(ring, document.getElementById("color").value);
      });
      document.getElementById("cancel").addEventListener("click", () => {
        window.limitRingsColorPicker.cancel();
      });
    </script>
  </body>
</html>
